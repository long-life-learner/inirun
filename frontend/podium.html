<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podium Juara — INI RUN FEST 2026</title>
  <meta name="description"
    content="Podium 3D interaktif pemenang INI RUN FEST 2026 — Juara 1, 2, 3 per kategori 5K, 10K, Half Marathon. 28 Juni 2026, AEON Mall Deltamas.">

  <!-- Open Graph -->
  <meta property="og:title" content="Podium Juara — INI RUN FEST 2026">
  <meta property="og:description"
    content="Lihat podium 3D pemenang INI RUN FEST 2026. 28 Juni 2026, AEON Mall Deltamas.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/og-podium.jpg">

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/podium.css">

  <!-- Three.js importmap — CDN ESM. ponytail: one importmap, no bundler. -->
  <script type="importmap">
  {
    "imports": {
      "three":                                  "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/":                          "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>

<body class="podium-page">

  <div id="nav-container"></div>

  <!-- Section header -->
  <header class="podium-section-header">
    <h1>PODIUM <span>JUARA</span></h1>
    <p>INI RUN FEST 2026 · 28 Juni · AEON Mall Deltamas</p>
  </header>

  <!-- Controls bar -->
  <div class="podium-controls" role="toolbar" aria-label="Pilih kategori podium">
    <span class="podium-controls__label" id="selector-label">Kategori:</span>
    <select id="category-selector" class="category-select" aria-labelledby="selector-label"
      aria-label="Pilih kategori dan gender">
      <!-- Populated by category-selector.js -->
    </select>
  </div>

  <!-- Error alert -->
  <div id="podium-error" class="container" style="padding:16px 20px;max-width:600px;margin:0 auto" hidden
    aria-live="polite">
    <div class="alert alert--error">
      <span>⚠️</span>
      <div>
        <strong>Gagal memuat podium.</strong>
        <span class="alert__msg"></span>
        <button class="btn btn--secondary" style="margin-top:8px;padding:6px 16px;font-size:12px"
          onclick="location.reload()">Coba Lagi</button>
      </div>
    </div>
  </div>

  <!-- 3D Stage -->
  <div id="podium-stage" class="podium-stage" role="img" aria-label="Podium 3D interaktif">

    <!-- Loading state -->
    <div id="podium-loading" class="podium-loading" aria-live="polite">
      <div class="podium-loading__spinner" aria-hidden="true"></div>
      <div class="podium-loading__text">Memuat Podium…</div>
    </div>

    <!-- HTML label overlays (anchored by JS to 3D positions) -->
    <div id="podium-labels" class="podium-labels" aria-hidden="true"></div>

    <!-- HUD buttons -->
    <div class="podium-hud">
      <button id="btn-reset-view" class="btn btn--secondary btn--icon" title="Reset tampilan kamera"
        aria-label="Reset tampilan kamera">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          aria-hidden="true">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
      </button>
      <button id="btn-share" class="btn btn--primary btn--icon" title="Bagikan podium sebagai gambar"
        aria-label="Bagikan podium">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          aria-hidden="true">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" />
          <polyline points="16 6 12 2 8 6" />
          <line x1="12" y1="2" x2="12" y2="15" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Fallback 2D (shown when WebGL unavailable) -->
  <div id="podium-fallback" class="podium-fallback" hidden aria-live="polite"></div>

  <div id="footer-container"></div>

  <script type="module" src="/js/podium/podium-page.js"></script>
</body>

</html>
