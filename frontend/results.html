<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hasil Lomba — INI RUN FEST 2026</title>
  <meta name="description"
    content="Lihat hasil lomba lari INI RUN FEST 2026. Cari nama atau BIB-mu, filter per kategori 5K, 10K, Half Marathon. 28 Juni 2026, AEON Mall Deltamas.">

  <!-- Open Graph -->
  <meta property="og:title" content="Hasil Lomba — INI RUN FEST 2026">
  <meta property="og:description"
    content="Cari hasil lomba INI RUN FEST 2026 — 5K, 10K, Half Marathon. AEON Mall Deltamas, 28 Juni 2026.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/og-results.jpg">
  <link rel="shortcut icon" href="assets/logo.jpg" type="image/x-icon">


  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/results.css">
  <link rel="stylesheet" href="/css/podium.css">
</head>

<body class="results-page">

  <!-- Navbar injected by JS -->
  <div id="nav-container"></div>

  <!-- Filter sticky bar -->
  <div class="filter-bar" role="search" aria-label="Filter dan pencarian hasil lomba">
    <div class="filter-bar__inner">

      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-wrap__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
          aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="search" id="search-input" class="search-input" placeholder="Cari nama atau BIB…" autocomplete="off"
          spellcheck="false" aria-label="Cari peserta berdasarkan nama atau nomor BIB">
      </div>
      <br>

      <!-- Category filter -->
      <div class="filter-group" role="group" aria-label="Filter kategori">
        <select id="filter-category" class="chip chip--dark" aria-label="Pilih kategori jarak">
          <option value="">Pilih Jarak</option>
          <option value="5K">5K</option>
        </select>
      </div>

      <div class="filter-divider" aria-hidden="true"></div>

      <!-- Gender filter -->
      <div class="filter-group" role="group" aria-label="Filter gender">
        <select id="filter-gender" class="chip chip--dark" aria-label="Pilih gender">
          <option value="">Pilih Gender</option>
          <option value="M">Putra</option>
          <option value="F">Putri</option>
        </select>
      </div>

      <!-- Reset -->
      <button id="filter-reset" class="filter-reset" aria-label="Reset semua filter">Reset</button>

    </div>
  </div>

  <!-- Error alert -->
  <div id="results-error" class="container" style="padding-top:16px" hidden aria-live="polite">
    <div class="alert alert--error">
      <span>⚠️</span>
      <div>
        <strong>Gagal memuat data.</strong>
        <span class="alert__msg"></span>
        <button class="btn btn--secondary" style="margin-top:8px;padding:6px 16px;font-size:12px"
          onclick="location.reload()">Coba Lagi</button>
      </div>
    </div>
  </div>

  <!-- Placeholder before choosing category -->
  <div id="results-placeholder" class="container"
    style="padding: var(--space-8) var(--space-5); text-align: center; color: var(--color-ink-600);">
    <div style="font-size: 48px; margin-bottom: var(--space-3);">🏃‍♂️</div>
    <h2
      style="font-family: var(--font-display); font-size: var(--text-display-md); text-transform: uppercase; color: var(--color-maroon-700);">
      Silakan Pilih Kategori</h2>
    <p style="margin-top: var(--space-2); font-size: var(--text-body-sm); color: var(--color-ink-600);">Gunakan filter
      di atas untuk memilih kategori jarak dan melihat hasil lomba resmi serta podium juara.</p>
  </div>

  <!-- Embedded Podium 3D Top-5 — driven by page filter state -->
  <div id="results-podium" class="results-podium" hidden aria-label="Podium 3D juara 1–5">
    <!-- Podium header — mirrors active filter -->
    <div class="podium-controls">
      <span class="podium-controls__label" id="selector-label">🏆 Podium Juara 1–5:</span>
      <span id="podium-category-label" class="podium-category-label" aria-live="polite">–</span>
    </div>

    <!-- 3D Stage -->
    <div id="podium-stage" class="podium-stage" role="img" aria-label="Podium 3D interaktif juara 1-5">
      <!-- Loading state -->
      <div id="podium-loading" class="podium-loading" aria-live="polite">
        <div class="podium-loading__spinner" aria-hidden="true"></div>
        <div class="podium-loading__text">Silakan pilih kategori…</div>
      </div>
      <!-- HTML label overlays -->
      <div id="podium-labels" class="podium-labels" aria-hidden="true"></div>
      <!-- HUD -->
      <div class="podium-hud">
        <button id="btn-reset-view" class="btn btn--secondary btn--icon" title="Reset tampilan kamera"
          aria-label="Reset tampilan kamera">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Fallback 2D (shown when WebGL unavailable) -->
    <div id="podium-fallback" class="podium-fallback" hidden aria-live="polite"></div>
  </div>

  <!-- Results section -->
  <section class="results-section" hidden aria-label="Tabel hasil lomba">
    <div class="results-meta">
      <span id="results-count" class="results-count" aria-live="polite">Memuat…</span>
    </div>

    <div class="results-table-wrap" tabindex="0" aria-label="Tabel hasil lomba, bisa digulir horizontal">
      <table class="results-table" aria-label="Hasil Lomba INI RUN FEST 2026">
        <thead>
          <tr>
            <th scope="col">Rank</th>
            <th scope="col">Nama</th>
            <th scope="col" class="col-time">Pace</th>
            <th scope="col" class="col-time">Finish Time</th>
            <th scope="col">Kategori</th>
            <th scope="col">Gender</th>
            <th scope="col">BIB</th>
          </tr>
        </thead>
        <tbody id="results-tbody" aria-live="polite" aria-busy="true">
          <!-- Rows injected by table-render.js -->
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <nav class="pagination" aria-label="Navigasi halaman">
      <button id="page-prev" class="btn btn--ghost" aria-label="Halaman sebelumnya" disabled>← Prev</button>
      <span id="page-info" class="pagination__info" aria-live="polite"></span>
      <button id="page-next" class="btn btn--ghost" aria-label="Halaman berikutnya">Next →</button>
    </nav>
  </section>

  <!-- Row template (not rendered, cloned by JS) -->
  <template id="row-template">
    <tr>
      <td>
        <div class="rank-cell"></div>
      </td>
      <td class="col-name"></td>
      <td class="col-time col-pace mono"></td>
      <td class="col-time col-gun-time mono"></td>
      <td><span class="badge badge--category"></span></td>
      <td class="col-gender"></td>
      <td class="col-bib mono"></td>
    </tr>
  </template>

  <!-- Footer injected by JS -->
  <div id="footer-container"></div>

  <!-- Three.js importmap -->
  <script type="importmap">
  {
    "imports": {
      "three":           "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/":   "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="/js/results/results-page.js"></script>
</body>

</html>
